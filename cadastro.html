<!DOCTYPE html>
<html lang>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Horizonte Blue - Início</title>

    <link rel="stylesheet" type="text/css" href="styles/global.css">
    <link rel="stylesheet" type="text/css" href="styles/login.css">

    <script src="scripts/theme.js"></script>
    <script src="scripts/cadastro.js"></script>
</head>
<body>
<header>
    <nav>
        <div>
            <h1>Horizonte Blue</h1>
        </div>
        <div>
            <ul>
                <li><a href="./login.html">Entrar</a></li>
                <li><button onclick="trocarTema()" id="trocar-tema"></button></li>
            </ul>
        </div>
    </nav>
</header>
<main>
    <section class="login-section">
        <form id="login-form">
            <div>
                <h1>Registrar-se</h1>
            </div>
            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
            </div>
            <div>
                <label for="email">E-mail</label>
                <input type="text" name="email" id="email" placeholder="Digite seu e-mail">
            </div>
            <div>
                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="Digite seu CEP">
            </div>
            <div>
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
            </div>
            <button type="button" onclick="cadastrar()">Registrar-se</button>
        </form>
    </section>
</main>
<footer>
    <div>
        <div>
            <p>© 2026 Horizonte Blue - Viagens & Turismo</p>
        </div>
        <div>
            <p>Contatos: (11) 9999-9999 | contato@horizonteblue.com.br</p>
        </div>
    </div>
</footer>
</body>
</html>
